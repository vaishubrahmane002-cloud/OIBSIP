<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 id="welcomeText">Hi, User!</h2>
    <p style="color: #8a6c53; margin-bottom: 25px; font-weight: 500;">Welcome to your secure dashboard. ✨</p>
    
    <svg id="bearSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="160" height="160">
      <defs>
        <radialGradient id="softBrown" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#d4aa87" /> <stop offset="50%" stop-color="#967253" /> <stop offset="100%" stop-color="#543c29" /> 
        </radialGradient>
        <radialGradient id="softSnout" cx="40%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#fff8f2" /> <stop offset="70%" stop-color="#ebd5c1" /> <stop offset="100%" stop-color="#c2a288" />
        </radialGradient>
        <radialGradient id="blush" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255, 136, 170, 0.55)" /> <stop offset="100%" stop-color="rgba(255, 136, 170, 0)" />
        </radialGradient>
        <radialGradient id="pawPad" cx="50%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#594230" /> <stop offset="100%" stop-color="#2d2015" />
        </radialGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#3a2717" flood-opacity="0.25"/>
        </filter>
      </defs>

      <g filter="url(#softShadow)">
        <circle cx="45" cy="60" r="24" fill="url(#softBrown)" />
        <circle cx="45" cy="62" r="11" fill="url(#pawPad)" />
        <circle cx="155" cy="60" r="24" fill="url(#softBrown)" />
        <circle cx="155" cy="62" r="11" fill="url(#pawPad)" />
      </g>

      <circle cx="100" cy="110" r="72" fill="url(#softBrown)" filter="url(#softShadow)" />
      <circle cx="55" cy="115" r="16" fill="url(#blush)" />
      <circle cx="145" cy="115" r="16" fill="url(#blush)" />

      <path d="M 62 95 Q 70 85 78 95" fill="none" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M 122 95 Q 130 85 138 95" fill="none" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>

      <ellipse cx="100" cy="132" rx="32" ry="24" fill="url(#softSnout)" filter="drop-shadow(0px 4px 4px rgba(0,0,0,0.15))" />
      <ellipse cx="100" cy="122" rx="11" ry="7" fill="#1a1a1a" />
      <ellipse cx="96" cy="120" rx="3" ry="1.5" fill="#ffffff" opacity="0.6" transform="rotate(-15 96 120)" />

      <path d="M 85 135 Q 100 155 115 135" fill="none" stroke="#2d2015" stroke-width="3" stroke-linecap="round"/>

      <g transform="translate(-16, 22)">
        <ellipse cx="70" cy="140" rx="22" ry="30" fill="url(#softBrown)" transform="rotate(-30 70 140)"/>
        <ellipse cx="70" cy="148" rx="12" ry="10" fill="url(#pawPad)" transform="rotate(-30 70 140)"/> 
        <circle cx="56" cy="132" r="4.5" fill="url(#pawPad)"/>
        <circle cx="68" cy="125" r="4.5" fill="url(#pawPad)"/>
        <circle cx="82" cy="130" r="4.5" fill="url(#pawPad)"/>
      </g>

      <g class="waving-paw" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.2))">
        <ellipse cx="170" cy="85" rx="22" ry="30" fill="url(#softBrown)" />
        <ellipse cx="170" cy="92" rx="12" ry="10" fill="url(#pawPad)" /> 
        <circle cx="158" cy="78" r="4.5" fill="url(#pawPad)"/>
        <circle cx="170" cy="71" r="4.5" fill="url(#pawPad)"/>
        <circle cx="182" cy="78" r="4.5" fill="url(#pawPad)"/>
      </g>
    </svg>

    <form action="/login.html" method="GET">
      <button type="submit" style="background-color: #ff6b6b; margin-top: 35px; box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);">
        LOGOUT
      </button>
    </form>
  </div>

  <script>
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      let userName = urlParams.get('name');

      if (userName) {
        if (userName.includes('@')) {
          userName = userName.split('@')[0];
        }
        document.getElementById("welcomeText").innerText = `Hi, ${userName}! ✨`;
      }
    };
  </script>
</body>
</html>
