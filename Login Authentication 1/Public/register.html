<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Sign Up!</h2>
    <div id="errorBox" class="error-box"></div>
    
    <svg id="bearSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="140" height="140">
      
      <defs>
        <radialGradient id="softBrown" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#d4aa87" /> <stop offset="50%" stop-color="#967253" /> <stop offset="100%" stop-color="#543c29" /> </radialGradient>

        <radialGradient id="softSnout" cx="40%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#fff8f2" />
          <stop offset="70%" stop-color="#ebd5c1" />
          <stop offset="100%" stop-color="#c2a288" />
        </radialGradient>

        <radialGradient id="blush" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255, 136, 170, 0.55)" />
          <stop offset="100%" stop-color="rgba(255, 136, 170, 0)" />
        </radialGradient>

        <radialGradient id="pawPad" cx="50%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#594230" />
          <stop offset="100%" stop-color="#2d2015" />
        </radialGradient>

        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#3a2717" flood-opacity="0.25"/>
        </filter>
      </defs>

      <g filter="url(#softShadow)">
        <circle cx="45" cy="60" r="24" fill="url(#softBrown)" />
        <circle cx="45" cy="62" r="11" fill="url(#pawPad)" />
        <circle cx="155" cy="60" r="24" fill="url(#softBrown)" />
        <circle cx="155" cy="62" r="11" fill="url(#pawPad)" />
      </g>

      <circle cx="100" cy="110" r="72" fill="url(#softBrown)" filter="url(#softShadow)" />

      <circle cx="55" cy="115" r="16" fill="url(#blush)" />
      <circle cx="145" cy="115" r="16" fill="url(#blush)" />

      <g class="pupil">
        <g class="blink-left">
        <circle cx="70" cy="95" r="8" fill="#1a1a1a" />
        <circle cx="67" cy="92" r="2.5" fill="#ffffff" /> 
        <circle cx="72" cy="97" r="1" fill="#ffffff" /> 
        </g>
        <g class="blink-right">
        <circle cx="130" cy="95" r="8" fill="#1a1a1a" />
        <circle cx="127" cy="92" r="2.5" fill="#ffffff" /> 
        <circle cx="132" cy="97" r="1" fill="#ffffff" /> 
      </g>
      </g>

      <ellipse cx="100" cy="132" rx="32" ry="24" fill="url(#softSnout)" filter="drop-shadow(0px 4px 4px rgba(0,0,0,0.15))" />
      <ellipse cx="100" cy="122" rx="11" ry="7" fill="#1a1a1a" />
      <ellipse cx="96" cy="120" rx="3" ry="1.5" fill="#ffffff" opacity="0.6" transform="rotate(-15 96 120)" />

      <path d="M 90 135 Q 100 148 110 135" fill="none" stroke="#2d2015" stroke-width="3" stroke-linecap="round"/>

      <g id="bearPaws">
        <g filter="drop-shadow(0px -2px 6px rgba(0,0,0,0.3))">
          <ellipse cx="70" cy="100" rx="22" ry="30" fill="url(#softBrown)" />
          <ellipse cx="70" cy="108" rx="12" ry="10" fill="url(#pawPad)" /> <circle cx="58" cy="95" r="4.5" fill="url(#pawPad)"/>
          <circle cx="70" cy="88" r="4.5" fill="url(#pawPad)"/>
          <circle cx="82" cy="95" r="4.5" fill="url(#pawPad)"/>
        </g>
        
        <g filter="drop-shadow(0px -2px 6px rgba(0,0,0,0.3))">
          <ellipse cx="130" cy="100" rx="22" ry="30" fill="url(#softBrown)" />
          <ellipse cx="130" cy="108" rx="12" ry="10" fill="url(#pawPad)" /> <circle cx="118" cy="95" r="4.5" fill="url(#pawPad)"/>
          <circle cx="130" cy="88" r="4.5" fill="url(#pawPad)"/>
          <circle cx="142" cy="95" r="4.5" fill="url(#pawPad)"/>
        </g>
      </g>
    </svg>

    <form action="/register" method="POST" autocomplete="off">
      <input type="text" id="emailInput" name="username" placeholder="Choose Username" required autocomplete="off">
      <input type="password" id="passInput" name="password" placeholder="Create Password" required minlength="6" autocomplete="new-password">
      <button type="submit">REGISTER</button>
    </form>
    
    <a href="login.html">Already have an account? Login</a>
  </div>

  <script>
    const emailInput = document.getElementById("emailInput");
    const passInput = document.getElementById("passInput");
    const bearSvg = document.getElementById("bearSvg");

    // eyes on username
    emailInput.addEventListener("focus", () => bearSvg.classList.add("look-down"));
    emailInput.addEventListener("blur", () => bearSvg.classList.remove("look-down"));
    
    // eyes closed while user type password 
    passInput.addEventListener("focus", () => bearSvg.classList.add("hide-eyes"));
    passInput.addEventListener("blur", () => bearSvg.classList.remove("hide-eyes"));
  </script>
</body>
</html>
