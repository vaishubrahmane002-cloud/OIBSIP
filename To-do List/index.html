<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Kawaii Todo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">

    <div class="toggle">
        <button onclick="toggleMode()">🌙 / ☀️</button>
    </div>

    <div class="container">
        <div class="profile">
            <img src="img 2.png" alt="User" class="profile-pic">
            <p class="username" id="userNameDisplay">Vaishnavi</p>
        </div>

        <h1>My Productive Tasks 🐻</h1>

        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Write a task...">
            <button onclick="addTask()">Add</button>
        </div>

        <div class="lists-container">
            <div class="list-section">
                <h3 class="list-title">Pending Tasks ⏳</h3>
                <ul id="pendingList" class="task-list"></ul>
            </div>

            <div class="list-section">
                <h3 class="list-title">Completed Tasks ✅</h3>
                <ul id="completedList" class="task-list"></ul>
            </div>
        </div>

        <div class="progress-container">
            <p id="progressText">0 / 0 tasks completed</p>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
        </div>

        <p class="footer">✨ stay productive ✨</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
