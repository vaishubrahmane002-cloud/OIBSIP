<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Task-1</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">
  <img src="bow.png" class="bow" width="100"> 

  <!-- Display -->
  <div class="display">
    <div id="calculation">0</div>
    <div id="result">0</div>
  </div>

  <!-- Buttons grid -->
  <div class="buttons">
    
    
    <!-- Top row useful buttons -->
   <button class="top-btn" id="paren-btn">()</button>
   <button class="top-btn" id="square">x²</button>
   <button class="top-btn" id="cube">x³</button>
   <button class="top-btn" id="power">xʸ</button>
   <button class="top-btn" id="pi">π</button>




    <!-- Row -->
    <button class="operator" id="backspace">←</button>
    <button class="number">7</button>
    <button class="number">8</button>
    <button class="number">9</button>
    <button class="operator">÷</button>

    <!-- Row -->
    <button class="toggle" id="toggle-sign">±</button>
    <button class="number">4</button>
    <button class="number">5</button>
    <button class="number">6</button>
    <button class="operator">×</button>

    <!-- Row -->
    <button class="clear">AC</button>
    <button class="number">1</button>
    <button class="number">2</button>
    <button class="number">3</button>
    <button class="operator">−</button>

    <!-- Bottom -->
    <button class="number">0</button>
    <button class="number">00</button>
    <button class="number">.</button>
    <button class="equals">=</button>
    <button class="operator">+</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
